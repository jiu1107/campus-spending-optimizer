<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대학생 소비 관리 시스템</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }
        h1, h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input[type="email"],
        .form-group input[type="password"],
        .form-group input[type="text"] {
            width: calc(100% - 20px);
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .btn {
            background-color: #3498db;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            transition: background-color 0.3s ease;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .message {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
        .error-message {
            color: #e74c3c;
        }
        .success-message {
            color: #27ae60;
        }
        #dashboard, #recommendations {
            display: none;
            margin-top: 30px;
        }
        .section-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2c3e50;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .category-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #eee;
        }
        .category-item:last-child {
            border-bottom: none;
        }
        .card-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card-item {
            background-color: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: transform 0.2s ease;
        }
        .card-item:hover {
            transform: translateY(-5px);
        }
        .card-item img {
            max-width: 100%;
            height: 150px;
            object-fit: contain;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .card-item h3 {
            margin-top: 0;
            color: #34495e;
        }
        .card-item p {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 5px;
        }
        .card-item .benefit {
            font-weight: bold;
            color: #e67e22;
        }
        .card-item .score {
            font-size: 1.1em;
            color: #27ae60;
            font-weight: bold;
            margin-top: 10px;
        }
        #consumption-form {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        #consumption-form .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            background-color: white;
        }
        #consumption-form .form-group input[type="datetime-local"] {
            width: calc(100% - 20px);
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .tab-buttons {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .tab-button {
            background-color: #ecf0f1;
            border: 1px solid #bdc3c7;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
            margin: 0 5px;
            transition: background-color 0.3s ease;
        }
        .tab-button.active {
            background-color: #3498db;
            color: white;
            border-color: #3498db;
        }
        .tab-button:hover:not(.active) {
            background-color: #dfe6e9;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <h1>대학생 소비 관리 시스템</h1>

    <div id="auth-section" class="container">
        <h2>회원가입 / 로그인</h2>
        <div class="tab-buttons">
            <button class="tab-button active" onclick="showTab('login-tab')">로그인</button>
            <button class="tab-button" onclick="showTab('signup-tab')">회원가입</button>
        </div>

        <div id="login-tab" class="tab-content active">
            <div class="form-group">
                <label for="loginEmail">이메일:</label>
                <input type="email" id="loginEmail" placeholder="이메일을 입력하세요">
            </div>
            <div class="form-group">
                <label for="loginPassword">비밀번호:</label>
                <input type="password" id="loginPassword" placeholder="비밀번호를 입력하세요">
            </div>
            <button class="btn" onclick="login()">로그인</button>
            <p id="loginMessage" class="message"></p>
        </div>

        <div id="signup-tab" class="tab-content">
            <div class="form-group">
                <label for="signupEmail">이메일:</label>
                <input type="email" id="signupEmail" placeholder="이메일을 입력하세요">
            </div>
            <div class="form-group">
                <label for="signupPassword">비밀번호:</label>
                <input type="password" id="signupPassword" placeholder="비밀번호를 입력하세요">
            </div>
            <div class="form-group">
                <label for="signupNickname">닉네임:</label>
                <input type="text" id="signupNickname" placeholder="닉네임을 입력하세요">
            </div>
            <button class="btn" onclick="signup()">회원가입</button>
            <p id="signupMessage" class="message"></p>
        </div>
    </div>

    <div id="main-app-section" style="display: none; width: 100%; max-width: 900px;">
        <div class="container">
            <h2 id="welcome-message"></h2>
            <button class="btn" onclick="logout()">로그아웃</button>
        </div>

        <div id="consumption-form" class="container">
            <h2 class="section-title">소비 내역 등록</h2>
            <div class="form-group">
                <label for="amount">금액:</label>
                <input type="number" id="amount" placeholder="소비 금액을 입력하세요">
            </div>
            <div class="form-group">
                <label for="category">카테고리:</label>
                <select id="category">
                    <option value="FOOD">식비</option>
                    <option value="CAFE">카페</option>
                    <option value="TRANSPORT">교통</option>
                    <option value="SHOPPING">쇼핑</option>
                    <option value="ENTERTAINMENT">오락</option>
                    <option value="EDUCATION">교육</option>
                    <option value="HEALTH">건강</option>
                    <option value="CONVENIENCE_STORE">편의점</option>
                    <option value="CULTURE">문화</option>
                    <option value="ETC">기타</option>
                </select>
            </div>
            <div class="form-group">
                <label for="storeName">가맹점명:</label>
                <input type="text" id="storeName" placeholder="가맹점명을 입력하세요">
            </div>
            <div class="form-group">
                <label for="consumedAt">소비 시간:</label>
                <input type="datetime-local" id="consumedAt">
            </div>
            <button class="btn" onclick="addConsumption()">소비 내역 등록</button>
            <p id="consumptionMessage" class="message"></p>
        </div>

        <div id="dashboard" class="container">
            <h2 class="section-title">소비 대시보드 (최근 1개월)</h2>
            <div id="category-summary"></div>
            <p id="dashboardMessage" class="message"></p>
        </div>

        <div id="recommendations" class="container">
            <h2 class="section-title">카드 추천</h2>
            <div class="form-group">
                <label for="latitude">현재 위도 (선택 사항):</label>
                <input type="text" id="latitude" placeholder="예: 37.5665">
            </div>
            <div class="form-group">
                <label for="longitude">현재 경도 (선택 사항):</label>
                <input type="text" id="longitude" placeholder="예: 126.9780">
            </div>
            <button class="btn" onclick="getRecommendations()">카드 추천 받기</button>
            <p id="recommendationMessage" class="message"></p>
            <div id="card-recommendation-list" class="card-list"></div>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:8080/api'; // Spring Boot 백엔드 주소
        let userId = null;
        let accessToken = null;
        let nickname = null;

        document.addEventListener('DOMContentLoaded', () => {
            // 현재 날짜와 시간을 기본값으로 설정
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('consumedAt').value = now.toISOString().slice(0, 16);

            // 로컬 스토리지에서 토큰 확인
            const storedToken = localStorage.getItem('accessToken');
            const storedUserId = localStorage.getItem('userId');
            const storedNickname = localStorage.getItem('nickname');

            if (storedToken && storedUserId && storedNickname) {
                accessToken = storedToken;
                userId = storedUserId;
                nickname = storedNickname;
                showMainApp();
                fetchDashboardData();
            }
        });

        function showTab(tabId) {
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            document.querySelector(`[onclick="showTab('${tabId}')"]`).classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        async function signup() {
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const nickname = document.getElementById('signupNickname').value;
            const messageElement = document.getElementById('signupMessage');

            try {
                const response = await fetch(`${BASE_URL}/auth/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password, nickname })
                });

                const text = await response.text();
                if (response.ok) {
                    messageElement.className = 'message success-message';
                    messageElement.textContent = '회원가입 성공! 로그인해주세요.';
                    document.getElementById('signupEmail').value = '';
                    document.getElementById('signupPassword').value = '';
                    document.getElementById('signupNickname').value = '';
                    showTab('login-tab'); // 회원가입 성공 후 로그인 탭으로 이동
                } else {
                    messageElement.className = 'message error-message';
                    messageElement.textContent = `회원가입 실패: ${text}`; // 서버에서 보낸 에러 메시지 표시
                }
            } catch (error) {
                console.error('Signup error:', error);
                messageElement.className = 'message error-message';
                messageElement.textContent = '네트워크 오류 또는 서버 응답 없음.';
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const messageElement = document.getElementById('loginMessage');

            try {
                const response = await fetch(`${BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    accessToken = data.accessToken;
                    nickname = data.nickname;

                    // 로그인한 사용자 정보(userId)를 가져와야 함 (현재는 임시로 1로 설정)
                    // 실제로는 로그인 응답에 userId를 포함하거나, 토큰에서 파싱해야 함
                    // 여기서는 편의상 userId를 1로 가정하고 진행합니다.
                    // TODO: 백엔드 로그인 응답에 userId 추가 필요
                    userId = 1; // 임시 userId

                    localStorage.setItem('accessToken', accessToken);
                    localStorage.setItem('userId', userId);
                    localStorage.setItem('nickname', nickname);

                    messageElement.className = 'message success-message';
                    messageElement.textContent = `${nickname}님, 환영합니다!`;
                    showMainApp();
                    fetchDashboardData();
                } else {
                    messageElement.className = 'message error-message';
                    messageElement.textContent = '로그인 실패: 이메일 또는 비밀번호를 확인하세요.';
                }
            } catch (error) {
                console.error('Login error:', error);
                messageElement.className = 'message error-message';
                messageElement.textContent = '네트워크 오류 또는 서버 응답 없음.';
            }
        }

        function logout() {
            accessToken = null;
            userId = null;
            nickname = null;
            localStorage.removeItem('accessToken');
            localStorage.removeItem('userId');
            localStorage.removeItem('nickname');
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('main-app-section').style.display = 'none';
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginMessage').textContent = '';
            document.getElementById('signupMessage').textContent = '';
        }

        function showMainApp() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-app-section').style.display = 'block';
            document.getElementById('welcome-message').textContent = `${nickname}님의 소비 관리 대시보드`;
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('recommendations').style.display = 'block';
        }

        async function addConsumption() {
            const amount = document.getElementById('amount').value;
            const category = document.getElementById('category').value;
            const storeName = document.getElementById('storeName').value;
            const consumedAt = document.getElementById('consumedAt').value;
            const messageElement = document.getElementById('consumptionMessage');

            if (!amount || !category || !consumedAt) {
                messageElement.className = 'message error-message';
                messageElement.textContent = '금액, 카테고리, 소비 시간은 필수 입력 항목입니다.';
                return;
            }

            try {
                const response = await fetch(`${BASE_URL}/consumptions/${userId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`
                    },
                    body: JSON.stringify({
                        amount: parseInt(amount),
                        category: category,
                        storeName: storeName,
                        consumedAt: consumedAt + ':00' // 초 단위 추가
                    })
                });

                if (response.ok) {
                    messageElement.className = 'message success-message';
                    messageElement.textContent = '소비 내역이 성공적으로 등록되었습니다.';
                    document.getElementById('amount').value = '';
                    document.getElementById('storeName').value = '';
                    // 대시보드 데이터 새로고침
                    fetchDashboardData();
                } else {
                    const errorText = await response.text();
                    messageElement.className = 'message error-message';
                    messageElement.textContent = `소비 내역 등록 실패: ${errorText}`; // 서버 에러 메시지 표시
                }
            } catch (error) {
                console.error('Add consumption error:', error);
                messageElement.className = 'message error-message';
                messageElement.textContent = '네트워크 오류 또는 서버 응답 없음.';
            }
        }

        async function fetchDashboardData() {
            const messageElement = document.getElementById('dashboardMessage');
            const summaryDiv = document.getElementById('category-summary');
            summaryDiv.innerHTML = ''; // 기존 내용 초기화

            const now = new Date();
            const oneMonthAgo = new Date();
            oneMonthAgo.setMonth(now.getMonth() - 1);

            const startDate = oneMonthAgo.toISOString().slice(0, 19); // YYYY-MM-DDTHH:MM:SS
            const endDate = now.toISOString().slice(0, 19);

            try {
                const response = await fetch(`${BASE_URL}/consumptions/summary/category/${userId}?startDate=${startDate}&endDate=${endDate}`, {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                if (response.ok) {
                    const summary = await response.json();
                    if (summary.length > 0) {
                        summary.forEach(item => {
                            const div = document.createElement('div');
                            div.className = 'category-item';
                            div.innerHTML = `<span>${getCategoryDisplayName(item.category)}</span><span>${item.totalAmount.toLocaleString()}원</span>`;
                            summaryDiv.appendChild(div);
                        });
                        messageElement.textContent = '';
                    } else {
                        messageElement.className = 'message info-message';
                        messageElement.textContent = '최근 1개월 소비 내역이 없습니다.';
                    }
                } else {
                    messageElement.className = 'message error-message';
                    messageElement.textContent = '대시보드 데이터를 불러오는데 실패했습니다.';
                }
            } catch (error) {
                console.error('Fetch dashboard error:', error);
                messageElement.className = 'message error-message';
                messageElement.textContent = '네트워크 오류 또는 서버 응답 없음.';
            }
        }

        async function getRecommendations() {
            const latitude = document.getElementById('latitude').value;
            const longitude = document.getElementById('longitude').value;
            const messageElement = document.getElementById('recommendationMessage');
            const cardListDiv = document.getElementById('card-recommendation-list');
            cardListDiv.innerHTML = ''; // 기존 내용 초기화

            let url = `${BASE_URL}/recommendations/cards/${userId}`;
            const params = new URLSearchParams();
            if (latitude) params.append('latitude', latitude);
            if (longitude) params.append('longitude', longitude);
            if (params.toString()) url += `?${params.toString()}`;

            try {
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                if (response.ok) {
                    const recommendations = await response.json();
                    if (recommendations.length > 0) {
                        recommendations.forEach(card => {
                            const cardItem = document.createElement('div');
                            cardItem.className = 'card-item';
                            cardItem.innerHTML = `
                                <img src="${card.imageUrl || 'https://via.placeholder.com/150?text=Card'}" alt="${card.cardName}">
                                <h3>${card.cardName} (${card.company})</h3>
                                <p>추천 카테고리: <span class="benefit">${getCategoryDisplayName(card.recommendedCategory)}</span></p>
                                <p>최대 혜택: <span class="benefit">${(card.maxBenefitValue * 100).toFixed(0)}%</span></p>
                                <p class="score">추천 점수: ${card.recommendationScore.toFixed(2)}</p>
                            `;
                            cardListDiv.appendChild(cardItem);
                        });
                        messageElement.textContent = '';
                    } else {
                        messageElement.className = 'message info-message';
                        messageElement.textContent = '추천할 카드를 찾을 수 없습니다.';
                    }
                } else {
                    messageElement.className = 'message error-message';
                    messageElement.textContent = '카드 추천을 불러오는데 실패했습니다.';
                }
            } catch (error) {
                console.error('Fetch recommendations error:', error);
                messageElement.className = 'message error-message';
                messageElement.textContent = '네트워크 오류 또는 서버 응답 없음.';
            }
        }

        function getCategoryDisplayName(category) {
            const categoryMap = {
                'FOOD': '식비',
                'CAFE': '카페',
                'TRANSPORT': '교통',
                'SHOPPING': '쇼핑',
                'ENTERTAINMENT': '오락',
                'EDUCATION': '교육',
                'HEALTH': '건강',
                'CONVENIENCE_STORE': '편의점',
                'CULTURE': '문화',
                'ETC': '기타'
            };
            return categoryMap[category] || category;
        }
    </script>
</body>
</html>
